<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Happy Birthday Ruqaiyya 🎂</title>

<style>

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{
  height:100vh;
  overflow:hidden;
  font-family:'Segoe UI',sans-serif;
  display:flex;
  justify-content:center;
  align-items:center;
  background:linear-gradient(135deg,#ff758c,#ff7eb3,#ffd3a5);
  position:relative;
}

/* Background Glow */
body::before{
  content:'';
  position:absolute;
  width:600px;
  height:600px;
  background:rgba(255,255,255,0.15);
  border-radius:50%;
  filter:blur(120px);
  animation:floatGlow 8s ease-in-out infinite;
}

@keyframes floatGlow{
  0%,100%{
    transform:translate(-100px,-80px);
  }
  50%{
    transform:translate(120px,100px);
  }
}

.card{
  width:360px;
  background:rgba(255,255,255,0.15);
  backdrop-filter:blur(14px);
  border:1px solid rgba(255,255,255,0.25);
  border-radius:28px;
  padding:35px 28px;
  text-align:center;
  color:white;
  box-shadow:0 20px 50px rgba(0,0,0,0.25);
  position:relative;
  z-index:5;
  animation:fadeUp 1.2s ease;
}

@keyframes fadeUp{
  from{
    opacity:0;
    transform:translateY(40px);
  }
  to{
    opacity:1;
    transform:translateY(0);
  }
}

h1{
  font-size:34px;
  margin-bottom:10px;
}

.name{
  font-size:28px;
  font-weight:bold;
  margin-bottom:20px;
  color:#fff4f7;
}

.message{
  font-size:15px;
  line-height:1.7;
  color:#fff;
  margin-bottom:25px;
}

.flower{
  width:220px;
  height:220px;
  object-fit:cover;
  border-radius:24px;
  margin-bottom:20px;
  box-shadow:0 15px 35px rgba(0,0,0,0.25);
}

button{
  border:none;
  padding:13px 26px;
  border-radius:30px;
  background:white;
  color:#ff4d88;
  font-weight:bold;
  font-size:15px;
  cursor:pointer;
  transition:0.3s;
}

button:hover{
  transform:scale(1.08);
}

.heart{
  position:absolute;
  font-size:20px;
  animation:floatUp linear forwards;
  pointer-events:none;
}

@keyframes floatUp{
  from{
    transform:translateY(0) scale(1);
    opacity:1;
  }
  to{
    transform:translateY(-120vh) scale(1.6);
    opacity:0;
  }
}

.final-screen{
  animation:fadeIn 1s ease;
}

@keyframes fadeIn{
  from{
    opacity:0;
    transform:scale(0.8);
  }
  to{
    opacity:1;
    transform:scale(1);
  }
}

/* Video Styling */
video{
  width:100%;
  max-width:320px;
  border-radius:20px;
  margin-top:20px;
  box-shadow:0 10px 30px rgba(0,0,0,0.3);
}

</style>
</head>

<body>

<audio id="music">
  <source src="https://cdn.pixabay.com/audio/2022/03/15/audio_45c8d7f9aa.mp3" type="audio/mp3">
</audio>

<div class="card" id="card">

  <h1>Happy Birthday 🎂</h1>

  <div class="name">Ruqaiyya 💖</div>

  <img 
    class="flower"
    src="https://images.unsplash.com/photo-1490750967868-88aa4486c946?q=80&w=1200&auto=format&fit=crop"
  >

  <div class="message">
    Some people make life softer just by existing.<br><br>
    I hope your smile never fades, your heart stays light,
    and this year brings you moments worth remembering.
  </div>

  <button id="surpriseBtn">
    Open Your Surprise ✨
  </button>

</div>

<script>

const btn = document.getElementById("surpriseBtn");
const card = document.getElementById("card");
const music = document.getElementById("music");

btn.addEventListener("click", () => {

  music.play();

  card.innerHTML =  `
  <div class="final-screen">

    <h1 style="margin-bottom:20px;">
      💖 Happy Birthday Ruqaiyya 💖
    </h1>

    <video 
      controls 
      autoplay 
      muted
      playsinline
      style="
        width:100%;
        border-radius:20px;
        box-shadow:0 10px 30px rgba(0,0,0,0.3);
      "
    >
      <source src="1000061711.mp4" type="video/mp4">
    </video>

  </div>
`;
      </div>

      <!-- VIDEO -->
      <video controls autoplay>
        <source src="1000061711.mp4" type="video/mp4">
      </video>

    </div>
  `;

  setInterval(createHeart,200);
});

function createHeart(){

  const heart=document.createElement("div");
  heart.classList.add("heart");

  const emojis=["💖","✨","💕","🌸","💘"];

  heart.innerHTML=emojis[Math.floor(Math.random()*emojis.length)];

  heart.style.left=Math.random()*window.innerWidth+"px";

  heart.style.animationDuration=(3+Math.random()*3)+"s";

  document.body.appendChild(heart);

  setTimeout(()=>{
    heart.remove();
  },6000);
}

</script>

</body>
</html>
