<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Happy Birthday Ruqaiyya 💖</title>

<style>

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{
  height:100vh;
  overflow:hidden;
  display:flex;
  justify-content:center;
  align-items:center;
  font-family:'Segoe UI',sans-serif;
  background:linear-gradient(135deg,#ff9eb5,#ffc2d1,#ffe5ec);
  position:relative;
}

/* soft animated glow */
body::before{
  content:'';
  position:absolute;
  width:600px;
  height:600px;
  background:rgba(255,255,255,0.2);
  border-radius:50%;
  filter:blur(120px);
  animation:glowMove 8s ease-in-out infinite;
}

@keyframes glowMove{
  0%,100%{
    transform:translate(-100px,-50px);
  }
  50%{
    transform:translate(120px,100px);
  }
}

.card{
  width:360px;
  padding:30px;
  border-radius:28px;
  background:rgba(255,255,255,0.18);
  backdrop-filter:blur(14px);
  border:1px solid rgba(255,255,255,0.25);
  box-shadow:0 20px 50px rgba(0,0,0,0.18);
  text-align:center;
  position:relative;
  z-index:2;
  animation:fadeUp 1s ease;
}

@keyframes fadeUp{
  from{
    opacity:0;
    transform:translateY(40px);
  }
  to{
    opacity:1;
    transform:translateY(0);
  }
}

h1{
  color:white;
  font-size:34px;
  margin-bottom:12px;
}

.name{
  color:white;
  font-size:28px;
  font-weight:bold;
  margin-bottom:20px;
}

.message{
  color:white;
  line-height:1.7;
  font-size:15px;
  margin-bottom:25px;
}

.flower{
  width:220px;
  height:220px;
  object-fit:cover;
  border-radius:24px;
  margin-bottom:20px;
  box-shadow:0 10px 30px rgba(0,0,0,0.25);
}

button{
  border:none;
  padding:13px 26px;
  border-radius:30px;
  background:white;
  color:#ff4d88;
  font-size:15px;
  font-weight:bold;
  cursor:pointer;
  transition:0.3s;
}

button:hover{
  transform:scale(1.08);
}

.heart{
  position:absolute;
  font-size:22px;
  pointer-events:none;
  animation:floatUp linear forwards;
}

@keyframes floatUp{
  from{
    transform:translateY(0) scale(1);
    opacity:1;
  }
  to{
    transform:translateY(-120vh) scale(1.6);
    opacity:0;
  }
}

video{
  width:100%;
  border-radius:20px;
  box-shadow:0 10px 30px rgba(0,0,0,0.3);
}

</style>
</head>

<body>

<div class="card" id="card">

  <h1>Happy Birthday 🎂</h1>

  <div class="name">
    💖 Ruqaiyya 💖
  </div>

  <img 
    class="flower"
    src="https://images.unsplash.com/photo-1518895949257-7621c3c786d7?q=80&w=1200&auto=format&fit=crop"
  >

  <div class="message">
    Some people make life softer just by existing.<br><br>

    I hope your smile never fades,
    your heart stays light,
    and this year brings you beautiful memories.ان شاء اللہ ✨
  </div>

  <button id="surpriseBtn">
    Open Your Surprise ✨
  </button>

</div>

<script>

const btn = document.getElementById("surpriseBtn");
const card = document.getElementById("card");

btn.addEventListener("click", () => {

  card.innerHTML = `

    <div class="final-screen">

      <h1 style="margin-bottom:20px;">
        💖 Happy Birthday Ruqaiyya 💖
      </h1>

      <video
        controls
        autoplay
        muted
        playsinline
      >
        <source src="1000061711.mp4" type="video/mp4">
      </video>

    </div>

  `;

  setInterval(createHeart,200);

});

function createHeart(){

  const heart=document.createElement("div");

  heart.classList.add("heart");

  const emojis=["💖","✨","💕","🌸","💘"];

  heart.innerHTML=emojis[Math.floor(Math.random()*emojis.length)];

  heart.style.left=Math.random()*window.innerWidth+"px";

  heart.style.animationDuration=(3+Math.random()*3)+"s";

  document.body.appendChild(heart);

  setTimeout(()=>{
    heart.remove();
  },6000);

}

</script>

</body>
</html>
